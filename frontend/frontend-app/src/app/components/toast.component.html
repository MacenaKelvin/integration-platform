<div class="toast-container" *ngIf="visible">
  <div class="toast-card" [ngClass]="type">
    <i
      class="bi"
      [ngClass]="{
        'bi-check-circle': type === 'success',
        'bi-x-circle': type === 'error',
        'bi-info-circle': type === 'info'
      }"
    ></i>
    <span>{{ message }}</span>
  </div>
</div>
